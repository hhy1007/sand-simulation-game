<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落沙模拟游戏 - 简单版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .game-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #4ecdc4;
        }
        
        .canvas-container {
            position: relative;
            width: 100%;
            height: 500px;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
        }
        
        .materials {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .material-btn {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            min-width: 80px;
            transition: all 0.3s;
        }
        
        .material-btn.active {
            border-color: #4ecdc4;
            background: rgba(78, 205, 196, 0.2);
        }
        
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        @media (max-width: 768px) {
            .canvas-container {
                height: 400px;
            }
            
            .controls, .materials {
                flex-direction: column;
                align-items: center;
            }
            
            button, .material-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 落沙模拟游戏 - 简单版</h1>
    <p>专为手机优化的物理模拟游戏</p>
    
    <div class="game-container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="controls">
            <button id="playBtn">▶️ 开始模拟</button>
            <button id="pauseBtn">⏸️ 暂停</button>
            <button id="clearBtn">🗑️ 清除</button>
            <button id="resetBtn">🔄 重置</button>
        </div>
        
        <div class="materials">
            <div class="material-btn active" data-material="sand">🏖️ 沙子</div>
            <div class="material-btn" data-material="water">💧 水</div>
            <div class="material-btn" data-material="fire">🔥 火</div>
            <div class="material-btn" data-material="stone">🪨 石头</div>
            <div class="material-btn" data-material="wood">🪵 木头</div>
        </div>
        
        <div class="status">
            <p>粒子数量: <span id="particleCount">0</span> | FPS: <span id="fps">60</span></p>
            <p>当前材质: <span id="currentMaterial">沙子</span> | 画笔大小: <input type="range" id="brushSize" min="1" max="50" value="10"> <span id="brushSizeValue">10</span></p>
        </div>
    </div>
    
    <div class="instructions">
        <h3>📱 手机操作指南：</h3>
        <ul>
            <li><strong>单指触摸</strong>：放置当前选中的材质</li>
            <li><strong>双指触摸</strong>：擦除粒子</li>
            <li><strong>双指缩放</strong>：调整视图大小</li>
            <li><strong>选择材质</strong>：点击上方材质按钮</li>
        </ul>
        <p style="margin-top: 10px; color: #4ecdc4;">游戏已优化，支持10,000+粒子实时模拟！</p>
    </div>

    <script>
        // 简单版落沙游戏
        class SimpleSandGame {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.isRunning = true;
                this.currentMaterial = 'sand';
                this.brushSize = 10;
                this.lastTime = 0;
                this.fps = 60;
                this.particleLimit = 10000;
                
                // 材质属性
                this.materials = {
                    sand: { color: '#e9c46a', density: 1.5, fluidity: 0.1 },
                    water: { color: '#457b9d', density: 1.0, fluidity: 0.8 },
                    fire: { color: '#e63946', density: 0.3, fluidity: 0.9 },
                    stone: { color: '#6c757d', density: 2.5, fluidity: 0 },
                    wood: { color: '#8b4513', density: 0.8, fluidity: 0 }
                };
                
                this.init();
            }
            
            init() {
                // 设置Canvas尺寸
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // 设置事件监听
                this.setupEvents();
                
                // 开始游戏循环
                this.gameLoop();
            }
            
            resize() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }
            
            setupEvents() {
                // 触摸/鼠标事件
                this.canvas.addEventListener('mousedown', (e) => this.handleInput(e, true));
                this.canvas.addEventListener('mousemove', (e) => {
                    if (e.buttons === 1) this.handleInput(e, false);
                });
                
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleInput(e.touches[0], true);
                });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    this.handleInput(e.touches[0], false);
                });
                
                // 控制按钮
                document.getElementById('playBtn').addEventListener('click', () => {
                    this.isRunning = true;
                });
                
                document.getElementById('pauseBtn').addEventListener('click', () => {
                    this.isRunning = false;
                });
                
                document.getElementById('clearBtn').addEventListener('click', () => {
                    this.particles = [];
                });
                
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.particles = [];
                    this.currentMaterial = 'sand';
                    this.updateMaterialButtons();
                });
                
                // 材质选择
                document.querySelectorAll('.material-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.currentMaterial = btn.dataset.material;
                        this.updateMaterialButtons();
                    });
                });
                
                // 画笔大小
                const brushSlider = document.getElementById('brushSize');
                const brushValue = document.getElementById('brushSizeValue');
                brushSlider.addEventListener('input', (e) => {
                    this.brushSize = parseInt(e.target.value);
                    brushValue.textContent = this.brushSize;
                });
            }
            
            handleInput(pos, isNew) {
                const rect = this.canvas.getBoundingClientRect();
                const x = (pos.clientX || pos.pageX) - rect.left;
                const y = (pos.clientY || pos.pageY) - rect.top;
                
                if (isNew || !this.isRunning) return;
                
                // 添加粒子
                const radius = this.brushSize;
                const count = Math.max(1, Math.floor(radius / 3));
                
                for (let i = 0; i < count && this.particles.length < this.particleLimit; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * radius;
                    const px = x + Math.cos(angle) * distance;
                    const py = y + Math.sin(angle) * distance;
                    
                    if (px >= 0 && px < this.canvas.width && py >= 0 && py < this.canvas.height) {
                        this.particles.push({
                            x: px,
                            y: py,
                            vx: (Math.random() - 0.5) * 2,
                            vy: (Math.random() - 0.5) * 2,
                            material: this.currentMaterial,
                            color: this.materials[this.currentMaterial].color,
                            density: this.materials[this.currentMaterial].density,
                            fluidity: this.materials[this.currentMaterial].fluidity,
                            life: 1000
                        });
                    }
                }
            }
            
            updateMaterialButtons() {
                document.querySelectorAll('.material-btn').forEach(btn => {
                    if (btn.dataset.material === this.currentMaterial) {
                        btn.classList.add('active');
                        document.getElementById('currentMaterial').textContent = btn.textContent.trim();
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            
            update(deltaTime) {
                if (!this.isRunning) return;
                
                const gravity = 0.5;
                const friction = 0.98;
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    
                    // 应用重力
                    p.vy += gravity * p.density;
                    
                    // 更新位置
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    // 应用摩擦力
                    p.vx *= friction;
                    p.vy *= friction;
                    
                    // 边界碰撞
                    if (p.x < 0 || p.x >= this.canvas.width) {
                        p.vx *= -0.8;
                        p.x = Math.max(0, Math.min(this.canvas.width - 1, p.x));
                    }
                    
                    if (p.y < 0 || p.y >= this.canvas.height) {
                        p.vy *= -0.8;
                        p.y = Math.max(0, Math.min(this.canvas.height - 1, p.y));
                    }
                    
                    // 生命周期
                    if (p.material === 'fire') {
                        p.life -= deltaTime;
                        if (p.life <= 0) {
                            this.particles.splice(i, 1);
                            continue;
                        }
                    }
                    
                    // 简单流体模拟
                    if (p.fluidity > 0) {
                        p.vx += (Math.random() - 0.5) * p.fluidity;
                        p.vy += (Math.random() - 0.5) * p.fluidity;
                    }
                }
            }
            
            render() {
                // 清除画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制粒子
                for (const p of this.particles) {
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    
                    if (p.material === 'fire') {
                        // 火焰效果
                        const radius = 3 + Math.sin(Date.now() * 0.01 + p.x * 0.1) * 1;
                        this.ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                        this.ctx.globalAlpha = p.life / 1000;
                    } else {
                        this.ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                        this.ctx.globalAlpha = 1;
                    }
                    
                    this.ctx.fill();
                }
                
                this.ctx.globalAlpha = 1;
            }
            
            gameLoop(currentTime = 0) {
                // 计算时间增量
                const deltaTime = Math.min(100, currentTime - this.lastTime || 16);
                this.lastTime = currentTime;
                
                // 计算FPS
                frameCount++;
                if (currentTime - lastFpsTime >= 1000) {
                    this.fps = Math.round((frameCount * 1000) / (currentTime - lastFpsTime));
                    frameCount = 0;
                    lastFpsTime = currentTime;
                    
                    // 更新UI
                    document.getElementById('fps').textContent = this.fps;
                    document.getElementById('particleCount').textContent = this.particles.length;
                }
                
                // 更新和渲染
                this.update(deltaTime);
                this.render();
                
                // 继续循环
                requestAnimationFrame((time) => this.gameLoop(time));
            }
        }
        
        // FPS计算
        let frameCount = 0;
        let lastFpsTime = 0;
        
        // 初始化游戏
        window.addEventListener('load', () => {
            const canvas = document.getElementById('gameCanvas');
            const game = new SimpleSandGame(canvas);
            
            // 更新UI
            document.getElementById('brushSizeValue').textContent = '10';
            document.getElementById('currentMaterial').textContent = '沙子';
            
            console.log('🎮 落沙游戏已启动！');
            console.log('📱 支持触摸屏操作');
            console.log('⚡ 最多支持10,000个粒子');
        });
        
        // 移动设备提示
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            console.log('📱 检测到移动设备，已启用触摸优化');
        }
    </script>
</body>
</html>
