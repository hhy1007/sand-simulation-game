<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落沙模拟游戏 - Sand Simulation Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-container">
        <!-- 标题区域 -->
        <header class="game-header">
            <h1><i class="fas fa-mountain"></i> 落沙模拟游戏</h1>
            <p class="subtitle">基于物理引擎的粒子模拟系统</p>
        </header>

        <!-- 主游戏区域 -->
        <main class="game-main">
            <div class="canvas-container">
                <canvas id="gameCanvas"></canvas>
                <div class="canvas-overlay">
                    <div class="instructions">
                        <h3><i class="fas fa-mouse-pointer"></i> 操作方法</h3>
                        <ul>
                            <li>点击/拖动: 放置材质</li>
                            <li>鼠标滚轮: 调整画笔大小</li>
                            <li>空格键: 暂停/继续</li>
                            <li>C键: 清空画布</li>
                            <li>R键: 重置模拟</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 控制面板 -->
            <div class="control-panel">
                <!-- 材质选择 -->
                <section class="materials-section">
                    <h3><i class="fas fa-palette"></i> 材质选择</h3>
                    <div class="materials-grid" id="materialsGrid">
                        <!-- 材质按钮将通过JavaScript动态生成 -->
                    </div>
                </section>

                <!-- 工具设置 -->
                <section class="tools-section">
                    <h3><i class="fas fa-tools"></i> 工具设置</h3>
                    <div class="tool-controls">
                        <div class="tool-control">
                            <label for="brushSize"><i class="fas fa-circle"></i> 画笔大小</label>
                            <input type="range" id="brushSize" min="1" max="50" value="10">
                            <span id="brushSizeValue">10</span>
                        </div>
                        <div class="tool-control">
                            <label for="gravity"><i class="fas fa-weight-hanging"></i> 重力强度</label>
                            <input type="range" id="gravity" min="0" max="20" value="9.8" step="0.1">
                            <span id="gravityValue">9.8</span>
                        </div>
                        <div class="tool-control">
                            <label for="simulationSpeed"><i class="fas fa-tachometer-alt"></i> 模拟速度</label>
                            <input type="range" id="simulationSpeed" min="1" max="10" value="5">
                            <span id="speedValue">5</span>
                        </div>
                    </div>
                </section>

                <!-- 游戏控制 -->
                <section class="game-controls-section">
                    <h3><i class="fas fa-gamepad"></i> 游戏控制</h3>
                    <div class="game-buttons">
                        <button id="playPauseBtn" class="btn btn-primary">
                            <i class="fas fa-play"></i> 开始模拟
                        </button>
                        <button id="clearBtn" class="btn btn-secondary">
                            <i class="fas fa-trash"></i> 清空
                        </button>
                        <button id="resetBtn" class="btn btn-secondary">
                            <i class="fas fa-redo"></i> 重置
                        </button>
                        <button id="saveBtn" class="btn btn-success">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <button id="loadBtn" class="btn btn-info">
                            <i class="fas fa-folder-open"></i> 加载
                        </button>
                    </div>
                </section>

                <!-- 统计信息 -->
                <section class="stats-section">
                    <h3><i class="fas fa-chart-bar"></i> 统计信息</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">粒子数量</span>
                            <span id="particleCount" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">帧率</span>
                            <span id="fpsCounter" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">物理更新</span>
                            <span id="physicsUpdate" class="stat-value">0ms</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">内存使用</span>
                            <span id="memoryUsage" class="stat-value">0MB</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- 页脚信息 -->
        <footer class="game-footer">
            <div class="footer-content">
                <p>
                    <i class="fas fa-code"></i> 使用 HTML5 Canvas + JavaScript 物理引擎构建 |
                    <i class="fas fa-users"></i> Claude Code Agent Teams 协作开发
                </p>
                <p class="footer-links">
                    <a href="#" id="helpBtn"><i class="fas fa-question-circle"></i> 帮助</a>
                    <a href="#" id="aboutBtn"><i class="fas fa-info-circle"></i> 关于</a>
                    <a href="#" id="githubBtn"><i class="fab fa-github"></i> 源代码</a>
                </p>
            </div>
        </footer>
    </div>

    <!-- 模态框 -->
    <div id="helpModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2><i class="fas fa-question-circle"></i> 游戏帮助</h2>
            <div class="modal-body">
                <!-- 帮助内容将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
